---
# yaml-language-server: $schema=https://schemas.gallay.io/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app jitsi-admin
  namespace: &namespace tools
spec:
  targetNamespace: *namespace
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  path: ./kubernetes/apps/tools/jitsi-admin/app
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: jitsi-admin-database
      namespace: tools
    - name: external-secrets
      namespace: secrets
    - name: cloudflare-tunnel
      namespace: network
    - name: democratic-csi
      namespace: system
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
      - name: jitsi-admin-secrets
        kind: Secret
      - name: jitsi-admin-database-secrets
        kind: Secret
      - name: jitsi-meet-secrets
        kind: Secret
  prune: true
  wait: false
  interval: 30m
  timeout: 5m
