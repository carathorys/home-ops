---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ${APP}
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  maxHistory: 3
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      main:
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            fsGroup: 0
        containers:
          main:
            image:
              # renovate: datasource=docker depName=registry.gitlab.com/crafty-controller/crafty-4
              repository: registry.gitlab.com/crafty-controller/crafty-4
              tag: 4.10.4
            env:
              TZ: "Europe/Budapest"
            ports:
              - containerPort: 8443
                protocol: TCP
              - containerPort: &javaPort 25565
                protocol: TCP
              - containerPort: &bedrockPort 19132
                protocol: UDP
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 16Gi
          proxy:
            image:
              # renovate: datasource=docker depName=nginx
              repository: nginx
              tag: 1.31-alpine
            resources:
              requests:
                cpu: 10m
                memory: 16Mi
              limits:
                memory: 64Mi
    configMaps:
      proxy-config:
        data:
          default.conf: |
            server {
                listen 8080;
                client_max_body_size 0;
                location / {
                    proxy_pass https://localhost:8443;
                    proxy_ssl_verify off;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection $connection_upgrade;
                    proxy_set_header X-Forwarded-Proto https;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header Host $host;
                    proxy_buffering off;
                    proxy_connect_timeout 3600s;
                    proxy_read_timeout 3600s;
                    proxy_send_timeout 3600s;
                    send_timeout 3600s;
                }
            }
            map $http_upgrade $connection_upgrade {
                default upgrade;
                '' close;
            }
    service:
      main:
        ports:
          http:
            port: &proxyPort 8080
            protocol: TCP
            targetPort: *proxyPort
      game:
        type: LoadBalancer
        loadBalancerIP: 192.168.2.3
        ports:
          java:
            port: *javaPort
            protocol: TCP
          bedrock:
            port: *bedrockPort
            protocol: UDP
    route:
      internal:
        hostnames: ["crafty.${SECRET_DOMAIN}"]
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: main
                port: *proxyPort
    persistence:
      servers:
        type: persistentVolumeClaim
        existingClaim: crafty-servers
        advancedMounts:
          main:
            main:
              - path: /crafty/servers
      backups:
        type: persistentVolumeClaim
        existingClaim: crafty-backups
        advancedMounts:
          main:
            main:
              - path: /crafty/backups
      config:
        type: persistentVolumeClaim
        existingClaim: crafty-config
        advancedMounts:
          main:
            main:
              - path: /crafty/app/config
      logs:
        type: persistentVolumeClaim
        existingClaim: crafty-logs
        advancedMounts:
          main:
            main:
              - path: /crafty/logs
      import:
        type: emptyDir
        advancedMounts:
          main:
            main:
              - path: /crafty/import
      proxy-config:
        type: configMap
        identifier: proxy-config
        advancedMounts:
          main:
            proxy:
              - path: /etc/nginx/conf.d
                readOnly: true
